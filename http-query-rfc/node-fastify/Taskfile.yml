version: '3'

tasks:
  verify:
    desc: Install dependencies and verify syntax and runtime behavior
    cmds:
      - npm ci
      - node --check server.js
      - |
        bash <<'VERIFY'
        set -eu

        port="${PORT:-3100}"
        response_file="$(mktemp)"
        server_log="$(mktemp)"
        PORT="$port" node server.js >"$server_log" 2>&1 &
        server_pid=$!

        cleanup() {
          kill "$server_pid" 2>/dev/null || true
          wait "$server_pid" 2>/dev/null || true
          rm -f "$response_file" "$server_log"
        }
        trap cleanup EXIT

        attempts=0
        until curl --silent --output /dev/null "http://localhost:$port/"; do
          attempts=$((attempts + 1))
          if [ "$attempts" -ge 50 ] || ! kill -0 "$server_pid" 2>/dev/null; then
            cat "$server_log"
            echo "Server did not become ready within 5 seconds" >&2
            exit 1
          fi
          sleep 0.1
        done

        curl --fail-with-body --silent --show-error \
          --request QUERY \
          --url "http://localhost:$port/productos/buscar" \
          --header 'content-type: application/json' \
          --data '{"categoria":"perifericos","precioMaximo":100}' \
          --output "$response_file"

        node -e '
          const fs = require("node:fs");
          const response = JSON.parse(fs.readFileSync(process.argv[1], "utf8"));
          const expectedProduct = response.productos?.length === 1
            && response.productos[0].nombre === "Mouse ergonomico"
            && response.productos[0].precio === 75
            && response.productos[0].categoria === "perifericos";
          const expectedConfirmation = response.confirmacion?.metodo === "QUERY"
            && response.confirmacion.total === 1
            && response.confirmacion.filtrosAplicados?.categoria === "perifericos"
            && response.confirmacion.filtrosAplicados?.precioMaximo === 100;
          if (!expectedProduct || !expectedConfirmation) {
            console.error("Unexpected QUERY response:", JSON.stringify(response, null, 2));
            process.exit(1);
          }
        ' "$response_file"
        VERIFY
