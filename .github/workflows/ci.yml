name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  node-fastify:
    name: HTTP QUERY / Node Fastify
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: http-query-rfc/node-fastify/package-lock.json

      - name: Install Task
        uses: arduino/setup-task@v2

      - name: Verify experiment
        working-directory: http-query-rfc/node-fastify
        run: task verify

  ci-gate:
    name: CI Gate
    if: always()
    needs:
      - node-fastify
    runs-on: ubuntu-latest
    steps:
      - name: Require every experiment job to succeed
        env:
          NODE_FASTIFY_RESULT: ${{ needs.node-fastify.result }}
        run: test "$NODE_FASTIFY_RESULT" = success
