dataSources:
  ds0:
    dataSourceClassName: com.zaxxer.hikari.HikariDataSource
    driverClassName: com.mysql.cj.jdbc.Driver
    jdbcUrl: jdbc:mysql://$${DB1_HOST::localhost}:$${DB1_PORT::3306}/$${DB1_NAME::db1}?serverTimezone=UTC&useSSL=false&useUnicode=true&characterEncoding=UTF-8
    username: $${DB1_USERNAME::root}
    password: $${DB1_PASSWORD::root}
  ds1:
    dataSourceClassName: com.zaxxer.hikari.HikariDataSource
    driverClassName: com.mysql.cj.jdbc.Driver
    jdbcUrl: jdbc:mysql://$${DB2_HOST::localhost}:$${DB2_PORT::3307}/$${DB2_NAME::db2}?serverTimezone=UTC&useSSL=false&useUnicode=true&characterEncoding=UTF-8
    username: $${DB2_USERNAME::root}
    password: $${DB2_PASSWORD::root}
rules:
  - !SHARDING
    tables:
      order:
        actualDataNodes: ds${0..1}.order
    defaultDatabaseStrategy:
      standard:
        shardingColumn: order_id
        shardingAlgorithmName: database_inline
    defaultTableStrategy:
      none:
    shardingAlgorithms:
      database_inline:
        type: INLINE
        props:
          algorithm-expression: ds${order_id % 2}
props:
  sql-show: false
